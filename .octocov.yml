coverage:
  paths:
    - coverage/lcov.info
  exclude:
    - Tests/**/*.swift
    - .build/**
  badge:
    path: docs/coverage.svg
codeToTestRatio:
  code:
    - Sources/**/*.swift
  test:
    - Tests/**/*.swift
  badge:
    path: docs/ratio.svg
testExecutionTime:
  if: github.event_name == 'push'
  badge:
    path: docs/time.svg
report:
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: github.event_name == 'pull_request'
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
summary:
  if: true
push:
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
