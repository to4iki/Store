coverage:
  paths:
    - coverage/lcov.info
  exclude:
    - Tests/**/*.swift
    - .build/**
codeToTestRatio:
  code:
    - Sources/**/*.swift
  test:
    - Tests/**/*.swift
testExecutionTime:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
summary:
  if: true
